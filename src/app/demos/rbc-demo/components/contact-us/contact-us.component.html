<section id="contact" class="py-24 bg-slate-50">
  <div class="container mx-auto px-4">
    <div class="mb-14 flex items-center justify-center">
      <div class="max-w-2xl text-center">
        <h5 class="mb-2 text-lg font-medium capitalize text-gray-800">
          Contact <span class="font-semibold text-primary">Us</span>
        </h5>
        <h2 class="mb-1 text-4xl font-bold text-gray-900">
          Get in Touch
        </h2>
      </div>
    </div>

    <div class="max-w-4xl mx-auto">
      <div class="bg-white rounded-xl shadow-lg p-8 md:p-12">
        <form action="#">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
              <label for="first-name" class="block text-sm font-medium text-gray-700 mb-2">First Name <span class="text-red-500">*</span></label>
              <input type="text" id="first-name" name="first-name" placeholder="First Name" 
                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
            <div>
              <label for="last-name" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
              <input type="text" id="last-name" name="last-name" placeholder="Last Name" 
                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>

          <div class="mb-6">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address <span class="text-red-500">*</span></label>
            <input type="email" id="email" name="email" placeholder="Email Address" 
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
          </div>

          <div class="mb-6">
            <label for="subject" class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Subject" 
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
          </div>

          <div class="mb-8">
            <label for="message" class="block text-sm font-medium text-gray-700 mb-2">Message <span class="text-red-500">*</span></label>
            <textarea id="message" name="message" rows="4" placeholder="Type your message here..." 
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none"></textarea>
          </div>

          <button type="submit" 
            class="w-full bg-primary text-white font-semibold py-4 rounded-lg shadow-md hover:bg-primary-dark transition-all focus:outline-none focus:ring-2 focus:ring-primary/40">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
